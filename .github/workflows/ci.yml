name: CI Pipeline

on: 
  push:
    branches: ["main"]

jobs:
  test:
      runs-on: ubuntu-latest

      steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: Install node
          uses: actions/setup-node@v4
          with:
           node-version: 18

        - name: Install dependencies
          run: npm install

        - name: Run tests
          run: npm test
         